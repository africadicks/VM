name: Setup Runner + Cloudflared + V2Ray

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 修改 runner 密码
      - name: Update runner password
        run: |
          echo "runner:runner" | sudo chpasswd

      # 安装 Cloudflared
      - name: Install Cloudflared
        run: |
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null

          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list

          sudo apt-get update
          sudo apt-get install -y cloudflared

      # 安装 V2Ray
      - name: Install V2Ray
        run: |
          sudo apt update -y
          sudo apt install -y curl unzip

          sudo mkdir -p /usr/local/v2ray
          cd /usr/local/v2ray

          curl -L -o v2ray.zip https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
          unzip -o v2ray.zip
          chmod +x v2ray

          UUID="86c50e3a-5b87-49dd-bd20-03c7f2735e40"
          echo "UUID=$UUID" >> $GITHUB_ENV

          sudo mkdir -p /usr/local/etc/v2ray

          sudo tee /usr/local/etc/v2ray/config.json > /dev/null <<EOF
{
  "log": {
    "loglevel": "debug"
  },
  "inbounds": [
    {
      "listen": "127.0.0.1",
      "port": 80,
      "protocol": "vless",
      "settings": {
        "clients": [
          { "id": "$UUID" }
        ],
        "decryption": "none"
      },
      "streamSettings": {
        "network": "ws",
        "wsSettings": {
          "path": "/"
        }
      }
    }
  ],
  "outbounds": [
    {
      "protocol": "freedom"
    }
  ]
}
EOF

          sudo tee /etc/systemd/system/v2ray.service > /dev/null <<EOF
[Unit]
Description=V2Ray Service
After=network.target

[Service]
ExecStart=/usr/local/v2ray/v2ray -config /usr/local/etc/v2ray/config.json
Restart=always

[Install]
WantedBy=multi-user.target
EOF

          sudo systemctl daemon-reload
          sudo systemctl enable v2ray
          sudo systemctl start v2ray

      # 启动 Tunnel
      - name: Start Cloudflared
        run: |
          sudo cloudflared service install YOUR_TOKEN_HERE
          sudo systemctl start cloudflared

      # 输出信息
      - name: Show Info
        run: |
          echo "====================="
          echo "UUID: $UUID"
          echo "Path: /"
          echo "====================="
          sleep 99999
