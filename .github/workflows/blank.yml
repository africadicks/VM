name: Setup Runner & Cloudflared + Xray

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 修改 runner 密码
      - name: Update runner user password
        run: |
          echo "runner:runner" | sudo chpasswd

      # 安装 Cloudflared
      - name: Install Cloudflared
        run: |
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null

          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list

          sudo apt-get update
          sudo apt-get install -y cloudflared

      # 安装 Xray
      - name: Install Xray
        run: |
          sudo apt update -y
          sudo apt install -y curl unzip

          sudo mkdir -p /usr/local/xray
          cd /usr/local/xray

          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip
          chmod +x xray

          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "UUID=$UUID" >> $GITHUB_ENV

          sudo mkdir -p /usr/local/etc/xray

          sudo tee /usr/local/etc/xray/config.json > /dev/null <<EOF
{
  "log": { "loglevel": "debug" },
  "inbounds": [
    {
      "listen": "127.0.0.1",
      "port": 10000,
      "protocol": "vless",
      "settings": {
        "clients": [{ "id": "$UUID" }],
        "decryption": "none"
      },
      "streamSettings": {
        "network": "ws",
        "wsSettings": { "path": "/ray" }
      }
    }
  ],
  "outbounds": [
    { "protocol": "freedom" }
  ]
}
EOF

          sudo tee /etc/systemd/system/xray.service > /dev/null <<EOF
[Unit]
Description=Xray Service
After=network.target

[Service]
ExecStart=/usr/local/xray/xray run -config /usr/local/etc/xray/config.json
Restart=always

[Install]
WantedBy=multi-user.target
EOF

          sudo systemctl daemon-reload
          sudo systemctl enable xray
          sudo systemctl start xray

      # 启动 Cloudflare Tunnel
      - name: Start Cloudflared Tunnel
        run: |
          sudo cloudflared service install YOUR_TOKEN_HERE
          sudo systemctl start cloudflared

      # 输出信息
      - name: Show Info
        run: |
          echo "======================"
          echo "UUID: $UUID"
          echo "Path: /ray"
          echo "Port: 通过 Cloudflare Tunnel"
          echo "======================"

          sleep 99999
