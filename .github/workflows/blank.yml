name: Setup Runner & Cloudflared

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ⭐ 修改 runner 用户密码
      - name: Update runner user password
        run: |
          sudo bash -c '
          USER_NAME="runner"
          USER_PASSWORD="runner"

          if ! id "$USER_NAME" &>/dev/null; then
            echo "[!] User $USER_NAME not found"
            exit 1
          fi

          echo "$USER_NAME:$USER_PASSWORD" | chpasswd
          echo "[+] Password updated for $USER_NAME"
          '

      # ⭐ 安装并启动 Cloudflared 服务
      - name: Install and setup Cloudflared
        run: |
          # 添加 Cloudflare GPG key
          sudo mkdir -p --mode=0755 /usr/share/keyrings
          curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | sudo tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null

          # 添加 apt 仓库
          echo 'deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main' | sudo tee /etc/apt/sources.list.d/cloudflared.list

          # 安装 cloudflared
          sudo apt-get update && sudo apt-get install -y cloudflared

          # 启动 cloudflared 服务（替换下面命令的 JSON token 为你的真实 token）
          sudo cloudflared service install eyJhIjoiOGQyMDg4NjE0Nzg1N2EwY2RjYzhkYjc3OGU4YjZlZjciLCJ0IjoiYjU4MjQ2MmItZTY5My00NzJkLThiMjktNmFkOWY1MDAyNzJhIiwicyI6Ik1ERXlOamcxTURJdE5UaGhZeTAwTUdJd0xUZzRPRE10TlRNek1UazFOVFprTkRJdyJ9

          echo "[+] Cloudflared installed and service started"
          sleep 99999
